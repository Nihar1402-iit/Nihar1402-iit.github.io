<script src="{{ base_path }}/assets/js/main.min.js"></script>

{% include analytics.html %}
{% include /comments-providers/scripts.html %}

<!-- tsParticles -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (document.getElementById("tsparticles")) {
      tsParticles.load("tsparticles", {
        background: { color: { value: "transparent" } },
        fpsLimit: 60,
        interactivity: {
          events: {
            onHover: { enable: true, mode: "grab" },
            onClick: { enable: true, mode: "push" },
            resize: true
          },
          modes: {
            grab: { distance: 180, links: { opacity: 0.8, color: "#66FCF1" } },
            push: { quantity: 4 }
          }
        },
        particles: {
          color: { value: "#66FCF1" },
          links: { 
            color: "#45A29E", distance: 150, enable: true, opacity: 0.4, width: 1.5,
            triangles: { enable: true, opacity: 0.05 }
          },
          move: { enable: true, speed: 1.5, direction: "none", random: false, straight: false, outModes: { default: "bounce" } },
          number: { density: { enable: true, area: 800 }, value: 80 },
          opacity: { 
            value: 0.8, 
            animation: { enable: true, minimumValue: 0.2, speed: 1.5, sync: false } 
          },
          shape: { type: "circle" },
          size: { 
            value: { min: 1, max: 4 }, 
            animation: { enable: true, speed: 3, minimumValue: 1, sync: false } 
          }
        },
        detectRetina: true
      });
    }
  });
</script>
