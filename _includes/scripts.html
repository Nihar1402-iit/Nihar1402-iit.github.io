{% include /comments-providers/scripts.html %}

<!-- tsParticles -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (document.getElementById("tsparticles")) {
      tsParticles.load("tsparticles", {
        background: { color: { value: "transparent" } },
        fpsLimit: 60,
        interactivity: {
          events: {
            onHover: { enable: true, mode: "grab" },
            onClick: { enable: true, mode: "push" },
            resize: true
          },
          modes: {
            grab: { distance: 180, links: { opacity: 0.8, color: "#66FCF1" } },
            push: { quantity: 4 }
          }
        },
        particles: {
          color: { value: "#66FCF1" },
          links: { 
            color: "#45A29E", distance: 150, enable: true, opacity: 0.4, width: 1.5,
            triangles: { enable: true, opacity: 0.05 }
          },
          move: { enable: true, speed: 1.5, direction: "none", random: false, straight: false, outModes: { default: "bounce" } },
          number: { density: { enable: true, area: 800 }, value: 80 },
          opacity: { 
            value: 0.8, 
            animation: { enable: true, minimumValue: 0.2, speed: 1.5, sync: false } 
          },
          shape: { type: "circle" },
          size: { 
            value: { min: 1, max: 4 }, 
            animation: { enable: true, speed: 3, minimumValue: 1, sync: false } 
          }
        },
        detectRetina: true
      });
    }

    // 1. Interactive Medical Slider
    const sliderContainer = document.getElementById("mri-slider");
    const foreground = document.getElementById("mri-foreground");
    const handle = document.getElementById("mri-handle");
    let isDragging = false;

    if (sliderContainer) {
      const updateSlider = (e) => {
        if (!isDragging) return;
        const rect = sliderContainer.getBoundingClientRect();
        let x = e.clientX || (e.touches && e.touches[0].clientX);
        if (!x) return;
        let pos = Math.max(0, Math.min(x - rect.left, rect.width));
        let percent = (pos / rect.width) * 100;
        foreground.style.width = percent + "%";
        handle.style.left = percent + "%";
      };

      sliderContainer.addEventListener("mousedown", () => isDragging = true);
      sliderContainer.addEventListener("touchstart", () => isDragging = true, {passive: true});
      window.addEventListener("mouseup", () => isDragging = false);
      window.addEventListener("touchend", () => isDragging = false);
      window.addEventListener("mousemove", updateSlider);
      window.addEventListener("touchmove", updateSlider, {passive: true});
    }

    // 2. CNN Sliding Window
    const cnnContainer = document.getElementById("cnn-demo");
    const cnnLens = document.getElementById("cnn-lens");

    if (cnnContainer && cnnLens) {
      cnnContainer.addEventListener("mousemove", function(e) {
        const rect = cnnContainer.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        cnnLens.style.left = x + "px";
        cnnLens.style.top = y + "px";
        
        // Match background position relative to the base image dimensions
        const bgPosX = -(x - 45); // 45 is half lens width
        const bgPosY = -(y - 45);
        cnnLens.style.backgroundPosition = `${bgPosX}px ${bgPosY}px`;
      });
    }
  });
</script>
